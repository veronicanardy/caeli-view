<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- rocket body -->
  <path d="M16 5.5 C16 5.5 11 10.5 11 17 L15 18.5 L17 18.5 L21 17 C21 10.5 16 5.5 16 5.5Z" fill="url(#body)"/>
  <!-- rocket window -->
  <circle cx="16" cy="14" r="2.2" fill="#0b1220" stroke="rgba(255,255,255,0.35)" stroke-width="0.6"/>
  <circle cx="16" cy="14" r="1.1" fill="url(#window)"/>
  <!-- left fin -->
  <path d="M11 17 L8.5 20.5 L11 19.5Z" fill="url(#fin)"/>
  <!-- right fin -->
  <path d="M21 17 L23.5 20.5 L21 19.5Z" fill="url(#fin)"/>
  <!-- exhaust flame -->
  <ellipse cx="16" cy="20.5" rx="2.4" ry="1.5" fill="rgba(84,214,214,0.18)"/>
  <path d="M14.2 19.5 Q16 24.5 17.8 19.5Z" fill="url(#flame)" opacity="0.92"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="body" x1="16" y1="5" x2="16" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#54d6d6"/>
      <stop offset="100%" stop-color="#76e4b5"/>
    </linearGradient>
    <linearGradient id="fin" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3ab8b8"/>
      <stop offset="100%" stop-color="#54d6d6"/>
    </linearGradient>
    <radialGradient id="window" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a0f0f0"/>
      <stop offset="100%" stop-color="#54d6d6"/>
    </radialGradient>
    <linearGradient id="flame" x1="16" y1="19" x2="16" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#76e4b5"/>
      <stop offset="50%" stop-color="#f8c76b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f8c76b" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
